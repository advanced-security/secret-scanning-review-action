
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:

  pester-ubuntu:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Pester (JUnit results + Cobertura coverage)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest

          Install-Module Pester -Force -Scope CurrentUser

          New-Item -ItemType Directory -Force -Path TestResults | Out-Null

          $config = New-PesterConfiguration

          # Tests location
          $config.Run.Path = 'tests/Action_tests.ps1'
          $config.Filter.ExcludeTag = @('SkipCI')
          $config.Run.Exit = $true

          # Emit JUnit XML test results
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'JUnitXml'
          $config.TestResult.OutputPath = 'TestResults/pester-junit.xml'

          # Emit Cobertura XML coverage for the action scripts
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @('action.ps1', 'ActionHelpers.psm1')
          $config.CodeCoverage.OutputFormat = 'Cobertura'
          $config.CodeCoverage.OutputPath = 'TestResults/coverage.cobertura.xml'

          Invoke-Pester -Configuration $config

          # Rename package in coverage report for better display
          $coverageFile = 'TestResults/coverage.cobertura.xml'
          if (Test-Path $coverageFile) {
              $content = Get-Content $coverageFile -Raw
              $content = $content -replace 'package name=""', 'package name="PowerShell Action"'
              Set-Content $coverageFile $content
          }

      - name: Publish test results (JUnit)
        uses: dorny/test-reporter@v3
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          name: Pester Tests (Ubuntu)
          path: TestResults/pester-junit.xml
          reporter: java-junit

      - name: Publish coverage summary (Cobertura)
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: TestResults/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Upload raw XML artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pester-results-ubuntu
          path: TestResults/

  pytest:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Run pytest
        run: pytest tests/test_action.py -v

  ## For testing out tests on Windows
  pester-windows:
    runs-on: windows-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Pester (JUnit results + Cobertura coverage)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest

          Install-Module Pester -Force -Scope CurrentUser

          New-Item -ItemType Directory -Force -Path TestResults | Out-Null

          $config = New-PesterConfiguration

          # Tests location
          $config.Run.Path = 'tests/Action_tests.ps1'
          $config.Filter.ExcludeTag = @('SkipCI')
          $config.Run.Exit = $true

          # Emit JUnit XML test results
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'JUnitXml'
          $config.TestResult.OutputPath = 'TestResults/pester-junit.xml'

          # Emit Cobertura XML coverage for the action scripts
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @('action.ps1', 'ActionHelpers.psm1')
          $config.CodeCoverage.OutputFormat = 'Cobertura'
          $config.CodeCoverage.OutputPath = 'TestResults/coverage.cobertura.xml'

          Invoke-Pester -Configuration $config

      - name: Publish test results (JUnit)
        uses: dorny/test-reporter@v3
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          name: Pester Tests (Windows)
          path: TestResults/pester-junit.xml
          reporter: java-junit

      # Note: CodeCoverageSummary is a container action (Linux-only)
      # Coverage summary is reported by the Ubuntu job

      - name: Upload raw XML artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pester-results-windows
          path: TestResults/
