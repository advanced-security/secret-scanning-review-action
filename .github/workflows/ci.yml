
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:

  pester-ubuntu:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pester (JUnit results + Cobertura coverage)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest

          Install-Module Pester -Force -Scope CurrentUser

          New-Item -ItemType Directory -Force -Path TestResults | Out-Null

          $config = New-PesterConfiguration

          # Tests location
          $config.Run.Path = 'tests/Action_tests.ps1'
          $config.Filter.ExcludeTag = @('SkipCI')
          $config.Run.Exit = $true

          # Emit JUnit XML test results
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'JUnitXml'
          $config.TestResult.OutputPath = 'TestResults/pester-junit.xml'

          # Emit Cobertura XML coverage for the action scripts
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @('action.ps1', 'ActionHelpers.psm1')
          $config.CodeCoverage.OutputFormat = 'Cobertura'
          $config.CodeCoverage.OutputPath = 'TestResults/coverage.cobertura.xml'

          Invoke-Pester -Configuration $config

          # Rename package in coverage report for better display
          $coverageFile = 'TestResults/coverage.cobertura.xml'
          if (Test-Path $coverageFile) {
              $content = Get-Content $coverageFile -Raw
              $content = $content -replace 'package name=""', 'package name="PowerShell Action"'
              Set-Content $coverageFile $content
          }

      - name: Publish test results (JUnit)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Pester Tests (Ubuntu)
          path: TestResults/pester-junit.xml
          reporter: java-junit

      - name: Publish coverage summary (Cobertura)
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: TestResults/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Upload raw XML artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pester-results-ubuntu
          path: TestResults/

  ## For testing out tests on Windows
  pester-windows:
    runs-on: windows-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pester (JUnit results + Cobertura coverage)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest

          Install-Module Pester -Force -Scope CurrentUser

          New-Item -ItemType Directory -Force -Path TestResults | Out-Null

          $config = New-PesterConfiguration

          # Tests location
          $config.Run.Path = 'tests/Action_tests.ps1'
          $config.Filter.ExcludeTag = @('SkipCI')
          $config.Run.Exit = $true

          # Emit JUnit XML test results
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'JUnitXml'
          $config.TestResult.OutputPath = 'TestResults/pester-junit.xml'

          # Emit Cobertura XML coverage for the action scripts
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @('action.ps1', 'ActionHelpers.psm1')
          $config.CodeCoverage.OutputFormat = 'Cobertura'
          $config.CodeCoverage.OutputPath = 'TestResults/coverage.cobertura.xml'

          Invoke-Pester -Configuration $config

      - name: Publish test results (JUnit)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Pester Tests (Windows)
          path: TestResults/pester-junit.xml
          reporter: java-junit

      # Note: CodeCoverageSummary is a container action (Linux-only)
      # Coverage summary is reported by the Ubuntu job

      - name: Upload raw XML artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pester-results-windows
          path: TestResults/

  # Separate job with minimal permissions for the coverage upload.
  # Skipped for fork PRs (artifact won't have been uploaded).
  upload-coverage:
    needs: pester-ubuntu
    if: ${{ !cancelled() && needs.pester-ubuntu.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # TODO: Reduce to `code-quality: write` once that permission scope ships.
      security-events: write
    steps:
      # On PRs, check out the head commit (not the merge commit) so coverage
      # data matches the commit SHA we report to the upload endpoint.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: pester-results-ubuntu
          path: TestResults/

      - name: Upload code coverage
        uses: code-quality-org/upload-code-coverage-action@main
        with:
          file: TestResults/coverage.cobertura.xml
          language: PowerShell
          label: code-coverage/pester
