
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:

  pester-ubuntu:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Pester (JUnit results + Cobertura coverage)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest

          Install-Module Pester -Force -Scope CurrentUser

          New-Item -ItemType Directory -Force -Path TestResults | Out-Null

          $config = New-PesterConfiguration

          # Tests location
          $config.Run.Path = 'tests/Action_tests.ps1'
          $config.Filter.ExcludeTag = @('SkipCI')
          $config.Run.Exit = $true

          # Emit JUnit XML test results
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'JUnitXml'
          $config.TestResult.OutputPath = 'TestResults/pester-junit.xml'

          # Emit Cobertura XML coverage for the action scripts
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @('action.ps1', 'ActionHelpers.psm1')
          $config.CodeCoverage.OutputFormat = 'Cobertura'
          $config.CodeCoverage.OutputPath = 'TestResults/coverage.cobertura.xml'

          Invoke-Pester -Configuration $config

          # Rename package in coverage report for better display
          $coverageFile = 'TestResults/coverage.cobertura.xml'
          if (Test-Path $coverageFile) {
              $content = Get-Content $coverageFile -Raw
              $content = $content -replace 'package name=""', 'package name="PowerShell Action"'
              Set-Content $coverageFile $content
          }

      - name: Publish test results (JUnit)
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          name: Pester Tests (Ubuntu)
          path: TestResults/pester-junit.xml
          reporter: java-junit

      - name: Publish coverage summary (Cobertura)
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        if: always()
        with:
          filename: TestResults/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@d4d6b0936434b21bc8345ad45a440c5f7d2c40ff # v3
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Upload raw XML artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: pester-results-ubuntu
          path: TestResults/

  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov requests

      - name: Run pytest with coverage
        run: |
          mkdir -p TestResults
          pytest tests/test_action.py -v --cov=action --cov-report=xml:TestResults/coverage.pytest.xml

      - name: Upload raw XML artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: pytest-results-ubuntu
          path: TestResults/

  ## For testing out tests on Windows
  pester-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write
    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Pester (JUnit results + Cobertura coverage)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest

          Install-Module Pester -Force -Scope CurrentUser

          New-Item -ItemType Directory -Force -Path TestResults | Out-Null

          $config = New-PesterConfiguration

          # Tests location
          $config.Run.Path = 'tests/Action_tests.ps1'
          $config.Filter.ExcludeTag = @('SkipCI')
          $config.Run.Exit = $true

          # Emit JUnit XML test results
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'JUnitXml'
          $config.TestResult.OutputPath = 'TestResults/pester-junit.xml'

          # Emit Cobertura XML coverage for the action scripts
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @('action.ps1', 'ActionHelpers.psm1')
          $config.CodeCoverage.OutputFormat = 'Cobertura'
          $config.CodeCoverage.OutputPath = 'TestResults/coverage.cobertura.xml'

          Invoke-Pester -Configuration $config

      - name: Publish test results (JUnit)
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          name: Pester Tests (Windows)
          path: TestResults/pester-junit.xml
          reporter: java-junit

      # Note: CodeCoverageSummary is a container action (Linux-only)
      # Coverage summary is reported by the Ubuntu job

      - name: Upload raw XML artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: pester-results-windows
          path: TestResults/

  # Separate job with minimal permissions for the coverage upload.
  # Skipped for fork PRs because the coverage upload requires token
  # permissions that are not available to workflows triggered from forks.
  upload-coverage:
    needs:
      - pester-ubuntu
      - pytest
    if: ${{ !cancelled() && needs.pester-ubuntu.result == 'success' && needs.pytest.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
    steps:
      # On PRs, check out the head commit (not the merge commit) so coverage
      # data matches the commit SHA we report to the upload endpoint.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pester-results-ubuntu
          path: TestResults/pester

      - name: Download Python coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pytest-results-ubuntu
          path: TestResults/pytest

      - name: Upload PowerShell code coverage
        uses: actions/upload-code-coverage@8ba057916f200c28a7fea17f90d3563629b9226e # v1
        with:
          file: TestResults/pester/coverage.cobertura.xml
          language: PowerShell
          label: code-coverage/pester

      - name: Upload Python code coverage
        uses: actions/upload-code-coverage@8ba057916f200c28a7fea17f90d3563629b9226e # v1
        with:
          file: TestResults/pytest/coverage.pytest.xml
          language: Python
          label: code-coverage/pytest
