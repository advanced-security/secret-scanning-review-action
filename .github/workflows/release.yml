name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version (e.g., 2.3.0). Leave empty to use bump."
        required: false
        type: string
        default: ''
      bump:
        description: "Auto-bump from latest release (patch/minor/major). Ignored if version is set."
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
      prerelease:
        description: "Create as a pre-release"
        required: false
        type: boolean
        default: false

jobs:
  release:
    uses: advanced-security/reusable-workflows/.github/workflows/release.yml@479412fa01ef5afc87ba10aaf19bd4297edbfcd3 # v0.3.1
    with:
      version: ${{ inputs.version }}
      bump: ${{ inputs.bump }}
      prerelease: ${{ inputs.prerelease }}
      update-readme-sha: true
    permissions:
      contents: write
      pull-requests: write
