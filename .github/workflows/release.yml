name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 2.3.0, 3.0.0)"
        required: true
        type: string
      prerelease:
        description: "Create as a pre-release"
        required: false
        type: boolean
        default: false

jobs:
  release:
    uses: advanced-security/reusable-workflows/.github/workflows/release.yml@1e9a5eaec15349802453a253279ee21094ff452b # main
    with:
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
    permissions:
      contents: write
