name: Update README SHA on Release

on:
  release:
    types: [published, edited]

permissions:
  contents: read

jobs:
  update-readme-sha:
    # Only run for full releases (not prereleases)
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main

      - name: Update README with release SHA
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          # Get the commit SHA for the release tag
          RELEASE_SHA=$(git rev-parse "$TAG_NAME")
          echo "Release tag: $TAG_NAME"
          echo "Release SHA: $RELEASE_SHA"
          SHORT_SHA="${RELEASE_SHA:0:12}"

          # Update SHA-pinned references in README.md
          # Match pattern: advanced-security/secret-scanning-review-action@<sha> # v<version>
          sed -i -E \
            "s|advanced-security/secret-scanning-review-action@[0-9a-f]{12,40}(\s+# v[0-9.]+)?|advanced-security/secret-scanning-review-action@${RELEASE_SHA} # ${TAG_NAME}|g" \
            README.md

          # Check if there were any changes
          if git diff --quiet README.md; then
            echo "No SHA changes needed in README.md"
            exit 0
          fi

          git diff README.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ github.token }}
          commit-message: "docs: update README action SHA to ${{ github.event.release.tag_name }}"
          title: "docs: update README action SHA to ${{ github.event.release.tag_name }}"
          branch: chore/update-readme-sha
          base: main
          labels: documentation
          body: |
            Automated PR to update the SHA-pinned action reference in README.md to match the latest release.

            **Release:** [${{ github.event.release.tag_name }}](${{ github.event.release.html_url }})
            **Commit:** `${{ github.event.release.target_commitish }}`

            This PR was automatically created by the "Update README SHA on Release" workflow.
